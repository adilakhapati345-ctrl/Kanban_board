<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProFlow Kanban</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <header>
            <h1>ProFlow Kanban</h1>
            <div class="input-group">
                <input type="text" id="taskInput" placeholder="What needs to be done?">
                <button onclick="addTask()" class="btn-add">
                    <i class="fas fa-plus"></i> Add
                </button>
            </div>
        </header>

        <main class="board">
            <section class="column" id="todo" ondrop="drop(event)" ondragover="allowDrop(event)">
                <div class="column-header">
                    <span class="indicator todo"></span>
                    <h3>To Do</h3>
                </div>
                <div class="task-list" id="todo-list"></div>
            </section>

            <section class="column" id="inprogress" ondrop="drop(event)" ondragover="allowDrop(event)">
                <div class="column-header">
                    <span class="indicator inprogress"></span>
                    <h3>In Progress</h3>
                </div>
                <div class="task-list" id="inprogress-list"></div>
            </section>

            <section class="column" id="done" ondrop="drop(event)" ondragover="allowDrop(event)">
                <div class="column-header">
                    <span class="indicator done"></span>
                    <h3>Done</h3>
                </div>
                <div class="task-list" id="done-list"></div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
